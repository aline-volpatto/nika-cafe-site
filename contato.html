<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato | Nika Cafés</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="contato">

<header class="header-contato">
<h1>Entre em contato com o Nika Cafés</h1>
<p>Tem alguma dúvida, sugestão ou quer falar conosco? Preencha o formulário abaixo.</p>
</header>

<main class="contato-container">

<form id="form-contato" class="form-contato">

<div class="campo">
<label for="nome">Nome</label>
<input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
</div>
<br>
<div class="campo">
<label for="telefone">Telefone</label>
<input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000">
</div>
<br>
<div class="campo">
<label for="email">Email</label>
<input type="email" id="email" name="email" placeholder="Digite seu email" required>
</div>
<br>
<div class="campo">
<label for="mensagem">Mensagem</label>
<textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva sua mensagem"></textarea>
</div>
<br>
<br>
<button type="submit" class="botao-enviar">Enviar mensagem</button>

</form>

</main>

<section>
<a href="index.html" class="botao-voltar">Voltar à página inicial</a>
</section>

<footer>

<p>&copy; Nika Cafés — do grão à xícara, uma experiência.</p>

</footer>

 <button id="btn-topo">&#8593;</button>
     <script src="script.js"></script>

</body>
</html>
